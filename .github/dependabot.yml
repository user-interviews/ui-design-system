version: 2

registries:
  fontawesome-npm:
    type: npm-registry
    url: https://npm.fontawesome.com
    token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

updates:
  - package-ecosystem: npm
    directory: "/"
    registries:
      - fontawesome-npm
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    # Only auto-open PRs for patch-level version updates
    # Minor and major bumps are left for people to evaluate manually
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
