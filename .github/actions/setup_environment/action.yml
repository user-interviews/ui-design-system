name: Setup environment
description: 'Pull code and install dependencies'

runs:
  using: 'composite'
  steps:
    - name: Confirm ENV
      uses: ./.github/actions/ensure_env
      with:
        env-key: FONTAWESOME_NPM_AUTH_TOKEN

    - name: Install Yarn
      run: |
        set -euo pipefail
        attempts=0
        max_attempts=3
        until [ "$attempts" -ge "$max_attempts" ]; do
          if corepack enable && corepack install; then
            exit 0
          fi
          attempts=$((attempts + 1))
          echo "corepack install failed (attempt ${attempts}/${max_attempts}), retrying..."
          sleep 5
        done
        echo "Failed to install Yarn with Corepack after ${max_attempts} attempts."
        exit 1
      shell: bash

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        cache: 'yarn'
        cache-dependency-path: |
          yarn.lock
          .yarnrc.yml
        node-version-file: ".node-version"

    - name: Install dependencies
      run: yarn install --immutable --check-cache
      shell: bash
