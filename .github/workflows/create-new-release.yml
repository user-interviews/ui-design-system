name: "Create new release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Select the version increment"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - premajor
          - preminor
          - prepatch
          - prerelease

permissions:
  contents: write
  pull-requests: write

env:
  FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

jobs:
  create-new-release:
    name: Create new release
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup_environment

      - name: Bump version in package.json
        env:
          # Surface workflow_dispatch input as an env var so this `run:` block
          # references "$BUMP_TYPE" instead of templating user input directly
          # into the shell command (zizmor: template-injection). The input is
          # already constrained by the `choice` list above, but pinning to an
          # env var keeps the audit clean and removes the implicit trust.
          BUMP_TYPE: ${{ github.event.inputs.version }}
        run: yarn version "$BUMP_TYPE"

      - name: Extract version from package.json
        id: extract_version
        run: |
          version=$(grep '"version"' package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          echo "Extracted version: $version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create version bump branch
        env:
          RELEASE_VERSION: ${{ steps.extract_version.outputs.version }}
        run: git checkout -b "release/v${RELEASE_VERSION}"

      - name: Initialize mandatory git config
        uses: fregante/setup-git-user@024bc0b8e177d7e77203b48dab6fb45666854b35 # v2

      - name: Commit manifest files
        id: make-commit
        env:
          RELEASE_VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          git add package.json
          git commit --message "Update package.json v${RELEASE_VERSION}"

          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Publish release branch
        env:
          RELEASE_VERSION: ${{ steps.extract_version.outputs.version }}
        run: git push origin "release/v${RELEASE_VERSION}"

      - name: Merge version update into main branch
        uses: thomaseizinger/create-pull-request@955adb4634198898bc24dca0468514c63a8fc98d # 1.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          head: release/v${{ steps.extract_version.outputs.version }}
          base: main
          title: "Merge release/v${{ steps.extract_version.outputs.version }} into main branch"

      - name: Install dependencies
        run: yarn install --immutable --check-cache

      - name: Compile assets bundle
        run: yarn build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Pack bundle tarball
        run: npm pack

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.extract_version.outputs.version }}
          name: Release v${{ steps.extract_version.outputs.version }}
          draft: false
          prerelease: false
          files: ./user-interviews-ui-design-system-${{ steps.extract_version.outputs.version }}.tgz
