name: "Create new release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Select the version increment"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - premajor
          - preminor
          - prepatch
          - prerelease

permissions:
  contents: write
  pull-requests: write

env:
  FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

jobs:
  create-new-release:
    name: Create new release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup_environment

      - name: Bump version in package.json
        run: yarn version ${{ github.event.inputs.version }}

      - name: Extract version from package.json
        id: extract_version
        run: |
          version=$(grep '"version"' package.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          echo "Extracted version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create version bump branch
        run: git checkout -b release/v${{ steps.extract_version.outputs.version }}

      - name: Initialize mandatory git config
        uses: fregante/setup-git-user@v2

      - name: Commit manifest files
        id: make-commit
        run: |
          git add package.json
          git commit --message "Update package.json v${{ steps.extract_version.outputs.version }}"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish release branch
        run: git push origin release/v${{ steps.extract_version.outputs.version }}

      - name: Merge version update into main branch
        run: |
          git checkout main
          git merge --ff-only release/v${{ steps.extract_version.outputs.version }}
          git push origin main

      - name: Install dependencies
        run: yarn install --immutable --check-cache

      - name: Compile assets bundle
        run: yarn build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Pack bundle tarball
        run: npm pack

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create \
            "v${{ steps.extract_version.outputs.version }}" \
            "./user-interviews-ui-design-system-${{ steps.extract_version.outputs.version }}.tgz" \
            --title "Release v${{ steps.extract_version.outputs.version }}"
