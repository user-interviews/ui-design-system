# .github/workflows/chromatic.yml

# Workflow name
name: "Chromatic build"

# Event for the workflow
on:
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without publishing to Chromatic"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

# List of jobs
jobs:
  chromatic-deployment:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Validate Chromatic run mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == false && github.ref_name != 'main' }}
        run: |
          echo "::error::Chromatic uploads are only allowed from main. Re-run with dry_run=true for $GITHUB_REF_NAME."
          exit 1

      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # 👈 Required to retrieve git history
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup_environment

      # In Dependabot runtime, Dependabot secrets are already in the process env.
      # In regular Actions runtime, fall back to Actions secrets.
      - name: Resolve Chromatic token from Actions secrets if not already set
        shell: bash
        run: |
          if [[ -z "${CHROMATIC_PROJECT_TOKEN:-}" ]]; then
            echo "CHROMATIC_PROJECT_TOKEN=${{ secrets.CHROMATIC_PROJECT_TOKEN }}" >> "$GITHUB_ENV"
          fi

      - name: Run Chromatic
        uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # v18.0.1
        with:
          dryRun: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run == true) || (github.event_name != 'workflow_dispatch' && github.ref_name != 'main') }}
